name: my-life-movie-backend

services:
  my-life-movie-backend:
    build:
      context: .
      target: runtime
    command:
      - uv
      - run
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
    environment:
      APP_ENV: local
      LOG_LEVEL: DEBUG
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-my_life_movie}:${MYSQL_PASSWORD:-my_life_movie_password}@my-life-movie-mysql:3306/${MYSQL_DATABASE:-my_life_movie}
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - my-life-movie-backend-venv:/app/.venv
    healthcheck:
      test:
        - CMD
        - uv
        - run
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    depends_on:
      my-life-movie-mysql:
        condition: service_healthy

  my-life-movie-mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-my_life_movie}
      MYSQL_USER: ${MYSQL_USER:-my_life_movie}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-my_life_movie_password}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - my-life-movie-mysql-data:/var/lib/mysql
    healthcheck:
      test:
        - CMD-SHELL
        - "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  my-life-movie-backend-venv:
  my-life-movie-mysql-data:
