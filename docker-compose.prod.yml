name: my-life-movie-backend

services:
  my-life-movie-backend:
    build:
      context: .
      target: runtime
    env_file: .env
    ports:
      - "8000:8000"
    healthcheck:
      test: [CMD, uv, run, python, -c,
             "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    depends_on:
      my-life-movie-redis:
        condition: service_healthy

  my-life-movie-video-worker:
    build:
      context: .
      target: runtime
    command:
      - uv
      - run
      - --frozen
      - --no-dev
      - python
      - -m
      - app.workers.video_generation_worker
    env_file: .env
    depends_on:
      my-life-movie-redis:
        condition: service_healthy
    restart: unless-stopped

  my-life-movie-redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    volumes:
      - my-life-movie-redis-data:/data
    healthcheck:
      test: [CMD, redis-cli, ping]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s

  my-life-movie-prometheus:
    image: prom/prometheus:v2.53.0
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - my-life-movie-prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    restart: unless-stopped

  my-life-movie-grafana:
    image: grafana/grafana:11.0.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - my-life-movie-grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - my-life-movie-prometheus
      - my-life-movie-loki
    restart: unless-stopped

  my-life-movie-loki:
    image: grafana/loki:2.9.3
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ./loki-config.yml:/etc/loki/loki-config.yaml:ro
      - my-life-movie-loki-data:/loki
    restart: unless-stopped

  my-life-movie-promtail:
    image: grafana/promtail:2.9.3
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - my-life-movie-loki
    restart: unless-stopped

volumes:
  my-life-movie-redis-data:
  my-life-movie-prometheus-data:
  my-life-movie-grafana-data:
  my-life-movie-loki-data:
