name: "작업"
description: "구현, 정리, 조사 등 일반 개발 작업을 등록합니다."
labels: ["🛠️ task"]
body:
  - type: dropdown
    id: task-type
    attributes:
      label: 작업 유형
      description: 어떤 성격의 작업인가요?
      options:
        - 구현
        - API
        - 리팩터링
        - 조사
        - 정리
        - 기타
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: 작업 설명
      description: 작업의 배경과 목적을 적어주세요.
    validations:
      required: true
  - type: textarea
    id: todo
    attributes:
      label: 할 일
      description: 작업 단위를 체크리스트로 적어주세요.
      placeholder: |
        - [ ] 요청 모델 추가
        - [ ] 서비스 로직 구현
        - [ ] 테스트 추가
    validations:
      required: true
  - type: textarea
    id: done
    attributes:
      label: 완료 조건
      description: 이 작업이 끝났다고 판단할 수 있는 기준을 적어주세요.
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: 참고 자료
      description: 관련 이슈, 문서, API 링크가 있다면 적어주세요.
    validations:
      required: false
