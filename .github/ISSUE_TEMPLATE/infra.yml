name: "인프라/CI"
description: "GitHub Actions, 빌드, 배포, 의존성, 환경 설정 작업을 등록합니다."
labels: ["⚙️ infra"]
body:
  - type: dropdown
    id: infra-type
    attributes:
      label: 작업 유형
      options:
        - CI
        - 배포
        - 빌드
        - 의존성
        - 환경 변수
        - 저장소 설정
        - 기타
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: 작업 설명
      description: 필요한 변경과 배경을 적어주세요.
    validations:
      required: true
  - type: textarea
    id: current
    attributes:
      label: 현재 상태
      description: 현재 문제나 제한 사항을 적어주세요.
    validations:
      required: false
  - type: textarea
    id: expected
    attributes:
      label: 기대 결과
      description: 변경 후 기대하는 상태를 적어주세요.
    validations:
      required: true
  - type: checkboxes
    id: checklist
    attributes:
      label: 체크리스트
      options:
        - label: 로컬에서 재현 또는 검증했습니다.
        - label: CI 실패 가능성을 확인했습니다.
        - label: 필요한 환경 변수 변경 사항을 문서화했습니다.
