name: "API"
description: "Endpoint 추가, 요청/응답 변경, API 오류 수정 작업을 등록합니다."
labels: ["🔌 api", "🖥️ backend"]
body:
  - type: dropdown
    id: api-change-type
    attributes:
      label: 변경 유형
      options:
        - 신규 API
        - 요청 형식 변경
        - 응답 형식 변경
        - 오류 처리 변경
        - 성능 개선
        - 기타
    validations:
      required: true
  - type: input
    id: endpoint
    attributes:
      label: Endpoint
      description: 대상 API 경로를 적어주세요.
      placeholder: "예: POST /movies/generate"
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: 변경 설명
      description: API 변경의 목적과 배경을 적어주세요.
    validations:
      required: true
  - type: textarea
    id: request
    attributes:
      label: 요청 형식
      description: request body, query, path parameter 변경 사항을 적어주세요.
      render: json
    validations:
      required: false
  - type: textarea
    id: response
    attributes:
      label: 응답 형식
      description: response body와 status code를 적어주세요.
      render: json
    validations:
      required: false
  - type: dropdown
    id: breaking-change
    attributes:
      label: Breaking Change 여부
      options:
        - "아니오"
        - "예"
        - "확인 필요"
    validations:
      required: true
  - type: textarea
    id: done
    attributes:
      label: 완료 조건
      description: API 작업 완료 기준을 적어주세요.
    validations:
      required: true
