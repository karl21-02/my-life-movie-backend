name: "기능 요청"
description: "새로운 기능을 요청합니다."
labels: ["✨ feature"]
body:
  - type: textarea
    id: description
    attributes:
      label: 설명
      description: 어떤 기능인지 간단히 설명해주세요.
    validations:
      required: true
  - type: textarea
    id: detail
    attributes:
      label: 상세 내용
      description: 구현 방법이나 참고 사항이 있다면 작성해주세요.
    validations:
      required: false
  - type: checkboxes
    id: checklist
    attributes:
      label: 체크리스트
      options:
        - label: 관련 이슈를 확인했습니다.
        - label: 기존 기능과 중복되지 않습니다.
