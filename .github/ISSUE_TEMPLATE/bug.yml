name: "버그 리포트"
description: "버그를 제보합니다."
labels: ["🐛 bug"]
body:
  - type: textarea
    id: bug-description
    attributes:
      label: 버그 설명
      description: 어떤 버그인지 간단히 설명해주세요.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 재현 방법
      description: 버그를 재현할 수 있는 단계를 작성해주세요.
      placeholder: |
        1. '...'로 이동
        2. '...'을 클릭
        3. 에러 발생
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 기대 동작
      description: 정상적으로 동작했을 때 어떤 결과를 기대하는지 작성해주세요.
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: 스크린샷
      description: 관련 스크린샷이 있다면 첨부해주세요.
    validations:
      required: false
