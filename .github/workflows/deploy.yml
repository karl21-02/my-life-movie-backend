name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Generate temp SSH key
        run: ssh-keygen -t rsa -b 4096 -f /tmp/deploy_key -N ""

      - name: Send SSH public key via EICE
        run: |
          aws ec2-instance-connect send-ssh-public-key \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
            --availability-zone ap-northeast-2a \
            --instance-os-user ec2-user \
            --ssh-public-key file:///tmp/deploy_key.pub

      - name: Open EICE tunnel
        run: |
          aws ec2-instance-connect open-tunnel \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
            --remote-port 22 \
            --local-port 22222 &
          echo $! > /tmp/tunnel.pid
          sleep 5

      - name: Deploy to EC2
        run: |
          ssh -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            -p 22222 \
            ec2-user@localhost << 'ENDSSH'
          cd ~/my-life-movie-backend
          git fetch origin main
          git reset --hard origin/main
          docker-compose -f docker-compose.prod.yml up -d --build
          docker-compose -f docker-compose.prod.yml exec -T my-life-movie-backend uv run alembic upgrade head
          ENDSSH

      - name: Close tunnel
        if: always()
        run: kill $(cat /tmp/tunnel.pid) || true
